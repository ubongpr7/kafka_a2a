services:
  kafka:
    image: confluentinc/cp-kafka:7.8.3
    container_name: ka2a-kafka-sasl
    ports:
      - "9094:9094"
    env_file:
      - .env
    volumes:
      - kafka_kraft_sasl:/var/lib/kafka/data
      - ./admin.properties:/etc/kafka/secrets/admin.properties:ro
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-lc",
          "kafka-topics --bootstrap-server localhost:9092 --command-config /etc/kafka/secrets/admin.properties --list >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 5s
      retries: 30

  acl-init:
    image: confluentinc/cp-kafka:7.8.3
    container_name: ka2a-kafka-sasl-acl-init
    depends_on:
      kafka:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./admin.properties:/etc/kafka/secrets/admin.properties:ro
      - ./init-acls.sh:/init-acls.sh:ro
    command: ["bash", "-lc", "/init-acls.sh"]
    restart: "no"

volumes:
  kafka_kraft_sasl:

