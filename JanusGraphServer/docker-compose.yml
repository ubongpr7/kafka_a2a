services:
  janusgraph:
    image: ${JANUSGRAPH_IMAGE:-janusgraph/janusgraph:1.0.0}
    container_name: ${JANUSGRAPH_CONTAINER_NAME:-janusgraph-server}
    restart: unless-stopped
    environment:
      JANUS_PROPS_TEMPLATE: ${JANUS_PROPS_TEMPLATE:-berkeleyje-lucene}
      JANUS_SERVER_TIMEOUT: ${JANUS_SERVER_TIMEOUT:-60}
      JANUS_STORAGE_TIMEOUT: ${JANUS_STORAGE_TIMEOUT:-120}
    ports:
      - "${JANUSGRAPH_HOST_PORT:-8182}:8182"
    volumes:
      - janusgraph_data:/var/lib/janusgraph

volumes:
  janusgraph_data:
    name: ${JANUSGRAPH_DATA_VOLUME:-janusgraph_data}
