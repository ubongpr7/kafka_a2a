x-ka2a-image: &ka2a_image
  # Shared image build config so `docker compose up` can build locally without pulling from a registry.
  # If you publish an image to Docker Hub, you can remove `build:` and set `image:` to your tag.
  image: kafka-a2a:local
  build:
    context: .
    args:
      KA2A_UV_EXTRAS: "server,auth"
  env_file:
    - .env

services:
  host-agent:
    <<: *ka2a_image
    volumes:
      - ./agent_cards:/app/agent_cards:ro
    command:
      [
        "agent",
        "--agent-card-path",
        "/app/agent_cards/host.agent-card.json",
        "--processor",
        "prompted-echo",
        "--push-notifications",
      ]

  echo-agent:
    <<: *ka2a_image
    volumes:
      - ./agent_cards:/app/agent_cards:ro
    command: ["agent", "--agent-card-path", "/app/agent_cards/echo.agent-card.json", "--processor", "echo"]

  gateway:
    <<: *ka2a_image
    depends_on:
      - host-agent
    ports:
      - "8000:8000"
    command: ["gateway", "--default-agent", "host", "--host", "0.0.0.0", "--port", "8000"]

  a2a-proxy:
    <<: *ka2a_image
    depends_on:
      - host-agent
    ports:
      - "8001:8001"
    command: ["proxy", "--agent-name", "host", "--host", "0.0.0.0", "--port", "8001"]
