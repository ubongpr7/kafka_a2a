x-ka2a-image: &ka2a_image
  # Shared image build config so `docker compose up` can build locally without pulling from a registry.
  # If you publish an image to Docker Hub, you can remove `build:` and set `image:` to your tag.
  image: kafka-a2a:local
  build:
    context: .
    args:
      KA2A_UV_EXTRAS: "server,auth,lang,redis,mcp"
  env_file:
    # Production deploys should export `KA2A_ENV_FILE=.env.prod` so the
    # containers do not start with the local development `.env`.
    - ${KA2A_ENV_FILE:-.env}

services:
  host-agent:
    <<: *ka2a_image
    volumes:
      - ./agent_cards:/app/agent_cards:ro
      - ./prompts:/app/prompts:ro
      - ./mcp-tools.prod.json:/app/mcp-tools.prod.json:ro
    environment:
      KA2A_SYSTEM_PROMPT_PATH: /app/prompts/host_agent.txt
      KA2A_TOOL_EXECUTOR: kafka_a2a.local_tools:build_interaction_tool_executor
      KA2A_ALLOWED_DOWNSTREAM_AGENTS: onboarding,users,product,inventory,pos
    command:
      [
        "agent",
        "--agent-card-path",
        "/app/agent_cards/host.agent-card.json",
        "--processor",
        "langgraph-chat",
        "--push-notifications",
      ]
    restart: unless-stopped


  onboarding-agent:
