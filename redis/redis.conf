# Redis config for K-A2A task storage.
#
# Security note:
# - Don't expose Redis to the public internet.
# - Prefer running inside a private network/VPC and/or firewall the port.
# - If you must accept remote connections, set REDIS_PASSWORD.

bind 0.0.0.0
port 6379
protected-mode yes

dir /data

# Persistence (recommended for task/event durability)
appendonly yes
appendfsync everysec

# RDB snapshots (optional)
save 900 1
save 300 10
save 60 10000

